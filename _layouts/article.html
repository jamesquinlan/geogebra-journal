---
layout: default
---

<article>

<h1>{{ page.title }}</h1>

<p>
<strong>{{ page.authors | join: ", " }}</strong>
</p>

<p>
Volume {{ page.volume }},
Issue {{ page.issue }},
{{ page.year }}
</p>

<hr>

{% if page.abstract %}
<h2>Abstract</h2>
<p>{{ page.abstract }}</p>
{% endif %}

{{ content }}

{% if page.pdf %}
<p>
<a class="btn primary"
href="{{ '/assets/pdf/' | append: page.pdf | relative_url }}">
Download PDF
</a>
</p>
{% endif %}

</article>
